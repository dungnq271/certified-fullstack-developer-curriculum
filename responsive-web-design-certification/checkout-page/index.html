<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Checkout Page</title>
  </head>

  <body>
    <h1>Checkout</h1>
    <section>
      <h2>Your Cart</h2>
      <img
        src="./example-guitar-dune.jpg"
        alt="A desert-inspired hollow body guitar with warm tones and custom desert glyph inlays."
        width="400"
        height="400"
      />
      <br />
      <p>Dune Guitar</p>
      <p>$599</p>
    </section>
    <section>
      <h2>Payment Information</h2>
      <form method="POST">
        <label for="card-name"
          >Cardholder Name <span aria-hidden="true">*</span></label
        >
        <input type="text" id="card-name" name="card-name" required />
        <br />
        <label for="card-number"
          >Card Number <span aria-hidden="true">*</span></label
        >
        <input
          type="text"
          id="card-number"
          name="card-number"
          aria-describedby="card-number-help"
          required
        />
        <p id="card-number-help">
          Please enter your 16-digit card number without spaces or dashes.
        </p>
        <label for="expiry-date"
          >Expiry Date <span aria-hidden="true">*</span></label
        >
        <input
          type="text"
          id="expiry-date"
          name="expiry-date"
          placeholder="MM/YY"
          required
        />
        <br />
        <label for="CVV">CVV <span aria-hidden="true">*</span></label>
        <input type="text" id="CVV" name="CVV" required />
        <br />
        <button type="submit">Place Order</button>
      </form>
    </section>
  </body>
</html>
